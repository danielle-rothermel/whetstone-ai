[project]
name = "whetstone-ai"
version = "0.1.0"
description = "Evaluation core being rebuilt on the dr-* libraries: failure classification and the LM provider boundary"
authors = [
    { name = "Danielle Rothermel", email = "danielle.rothermel@gmail.com" }
]
requires-python = ">=3.13, <3.15"
dependencies = [
    "dr-code",
    "dr-graph",
    "dr-platform",
    "dr-providers",
    "dr-serialize",
]

[dependency-groups]
# dbos and psycopg are test-only: the failure-policy tests verify
# classification behavior against their real error types.
dev = [
    "dbos>=2.25.0",
    "pre-commit>=4.6.0",
    "psycopg>=3.3.4",
    "pytest>=8.4.2",
    "ruff>=0.15.10",
    "ty>=0.0.54",
]

# dr-* libs are not on PyPI. Git sources remain reproducible through uv.lock;
# dr-providers uses an exact reviewed revision.
[tool.uv.sources]
dr-code = { git = "https://github.com/danielle-rothermel/dr-code", branch = "main" }
dr-graph = { git = "https://github.com/danielle-rothermel/dr-graph", branch = "main" }
dr-platform = { git = "https://github.com/danielle-rothermel/dr-platform", branch = "main" }
dr-providers = { git = "https://github.com/danielle-rothermel/dr-providers", rev = "befbef782f249c6a517f34fb6965d4e10b74cf29" }
dr-serialize = { git = "https://github.com/danielle-rothermel/dr-serialize", branch = "main" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/whetstone"]

[tool.ruff]
include = ["src/**/*.py", "scripts/**/*.py", "tests/**/*.py"]
line-length = 79
target-version = "py313"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.pyright]
venvPath = "."
venv = ".venv"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "RUF"]

[tool.ruff.lint.isort]
known-first-party = ["whetstone"]

[tool.ty.environment]
extra-paths = ["..", "tests"]

[tool.ty.src]
include = ["src/**/*.py", "scripts/**/*.py", "tests/**/*.py"]
