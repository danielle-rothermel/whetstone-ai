[project]
name = "whetstone-ai"
version = "0.1.0"
description = "Add your description here"
authors = [
    { name = "Danielle Rothermel", email = "danielle.rothermel@gmail.com" }
]
requires-python = ">=3.13, <3.15"
dependencies = [
    "alembic>=1.16.2",
    "datasets>=3.6.0",
    "dbos>=2.25.0",
    "dr-code",
    "dr-graph",
    "dr-platform",
    "dr-providers",
    "dr-serialize",
    "marimo[recommended]>=0.23.11",
    "matplotlib>=3.11.0",
    "pandas>=3.0.3",
    "pre-commit>=4.6.0",
    "psycopg>=3.3.4",
    "psycopg-pool>=3.3.1",
    "pygments>=2.20.0",
    "pytest>=8.4.2",
    "python-dotenv>=1.1.0",
    "pytz>=2025.2",
    "rich>=13.9.4",
    "ruff>=0.15.10",
    "sqlalchemy>=2.0.51",
    "ty>=0.0.54",
    "typer>=0.26.7",
    "zstandard>=0.25.0",
]

[project.scripts]
whetstone-publish = "whetstone.platform.publication:main"
whetstone-live-sweep = "whetstone.platform.live_sweep:main"

[dependency-groups]
dev = [
    "dspy==3.3.0b1",
]

# dr-* libs are not on PyPI; sources track main and uv.lock pins the exact
# commit. Refresh with `uv lock --upgrade-package <name>`.
[tool.uv.sources]
dr-code = { git = "https://github.com/danielle-rothermel/dr-code", branch = "main" }
dr-graph = { git = "https://github.com/danielle-rothermel/dr-graph", branch = "main" }
dr-platform = { git = "https://github.com/danielle-rothermel/dr-platform", rev = "a38359243e6d69b7888814619182b06751dba6ee" }
dr-providers = { git = "https://github.com/danielle-rothermel/dr-providers", branch = "main" }
dr-serialize = { git = "https://github.com/danielle-rothermel/dr-serialize", branch = "main" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/whetstone"]

[tool.ruff]
include = ["src/**/*.py", "scripts/**/*.py", "tests/**/*.py"]
line-length = 79
target-version = "py312"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: Postgres and DBOS integration tests (opt-in)",
]

[tool.pyright]
venvPath = "."
venv = ".venv"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "RUF"]

[tool.ruff.lint.isort]
known-first-party = ["whetstone", "dspy"]

[tool.ty.environment]
extra-paths = ["..", "tests"]

[tool.ty.src]
include = ["src/**/*.py", "scripts/**/*.py", "tests/**/*.py"]
