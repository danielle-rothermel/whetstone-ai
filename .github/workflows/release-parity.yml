name: Whetstone Release Parity

on:
  workflow_call:
    secrets:
      GH_DR_ORG_REPOS_READ_TOKEN:
        required: true
      DATABASE_URL:
        required: true
      MOTHERDUCK_DATABASE_URL:
        required: true
      NEON_DATABASE_URL:
        required: true
      UNITBENCH_RELEASE_PARITY_TOKEN:
        required: true

permissions: {}

jobs:
  release-parity:
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MOTHERDUCK_DATABASE_URL: ${{ secrets.MOTHERDUCK_DATABASE_URL }}
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      - run: uv sync --frozen --group dev
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: url.https://x-access-token:${{ secrets.GH_DR_ORG_REPOS_READ_TOKEN }}@github.com/danielle-rothermel/.insteadOf
          GIT_CONFIG_VALUE_0: https://github.com/danielle-rothermel/
      - name: Prepare Whetstone fixture
        run: uv run whetstone-publish release-parity-fixture prepare --descriptor "$RUNNER_TEMP/release-parity/descriptor.json"
      - name: Unitbench pinned consumer evidence
        env:
          UNITBENCH_RELEASE_PARITY_TOKEN: ${{ secrets.UNITBENCH_RELEASE_PARITY_TOKEN }}
          WHETSTONE_RELEASE_PARITY_DESCRIPTOR: ${{ runner.temp }}/release-parity/descriptor.json
        run: |
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: bearer ${UNITBENCH_RELEASE_PARITY_TOKEN}" clone --depth 1 https://github.com/danielle-rothermel/unitbench.git "$RUNNER_TEMP/unitbench"
          git -C "$RUNNER_TEMP/unitbench" fetch --depth 1 origin 8d18038
          git -C "$RUNNER_TEMP/unitbench" checkout --detach 8d18038
          cd "$RUNNER_TEMP/unitbench" && npm ci && npm run test:release-parity
      - name: Always clean run-owned fixture
        if: always()
        run: uv run whetstone-publish release-parity-fixture cleanup --descriptor "$RUNNER_TEMP/release-parity/descriptor.json" --cleanup-proof "$RUNNER_TEMP/release-parity/cleanup-proof.json"
      - name: Verify fail-closed cleanup evidence
        if: always()
        run: uv run whetstone-publish release-parity-fixture verify-evidence --descriptor "$RUNNER_TEMP/release-parity/descriptor.json" --cleanup-proof "$RUNNER_TEMP/release-parity/cleanup-proof.json"
      - name: Upload parity evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-parity-evidence
          path: ${{ runner.temp }}/release-parity/*.json
          if-no-files-found: error
