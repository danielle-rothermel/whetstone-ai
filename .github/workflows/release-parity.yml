name: Whetstone Release Parity

on:
  workflow_call:
    inputs:
      whetstone_sha:
        description: Exact immutable Whetstone producer commit requested by the caller.
        required: true
        type: string
    secrets:
      GH_DR_ORG_REPOS_READ_TOKEN:
        required: true
      DATABASE_URL:
        required: true
      MOTHERDUCK_DATABASE_URL:
        required: true
      NEON_DATABASE_URL:
        required: true
      UNITBENCH_RELEASE_PARITY_TOKEN:
        required: true
      WHETSTONE_BUNDLE_INTEGRITY_KEY_ID:
        required: true
      WHETSTONE_BUNDLE_INTEGRITY_PRIVATE_KEY:
        required: true
      WHETSTONE_BUNDLE_INTEGRITY_PUBLIC_KEY_RING:
        required: true

permissions: {}

jobs:
  release-parity:
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Reject an unlocked producer
        env:
          WHETSTONE_SHA: ${{ inputs.whetstone_sha }}
        run: test "${WHETSTONE_SHA}" = "$(printf '%s' "${WHETSTONE_SHA}" | grep -E '^[0-9a-f]{40}$')"
      - name: Checkout locked Whetstone producer
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: danielle-rothermel/whetstone-ai
          ref: ${{ inputs.whetstone_sha }}
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      - run: uv sync --frozen --group dev
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: url.https://x-access-token:${{ secrets.GH_DR_ORG_REPOS_READ_TOKEN }}@github.com/danielle-rothermel/.insteadOf
          GIT_CONFIG_VALUE_0: https://github.com/danielle-rothermel/
      - name: Materialize ephemeral bundle integrity key
        env:
          PRIVATE_KEY: ${{ secrets.WHETSTONE_BUNDLE_INTEGRITY_PRIVATE_KEY }}
        run: |
          umask 077
          install -d -m 700 "$RUNNER_TEMP/whetstone-integrity"
          printf '%s' "$PRIVATE_KEY" > "$RUNNER_TEMP/whetstone-integrity/private.pem"
          chmod 600 "$RUNNER_TEMP/whetstone-integrity/private.pem"
      - name: Prepare Whetstone fixture
        run: uv run whetstone-publish release-parity-fixture prepare --descriptor "$RUNNER_TEMP/release-parity/descriptor.json"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MOTHERDUCK_DATABASE_URL: ${{ secrets.MOTHERDUCK_DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          WHETSTONE_BUNDLE_INTEGRITY_KEY_ID: ${{ secrets.WHETSTONE_BUNDLE_INTEGRITY_KEY_ID }}
          WHETSTONE_BUNDLE_INTEGRITY_PRIVATE_KEY_PATH: ${{ runner.temp }}/whetstone-integrity/private.pem
          WHETSTONE_BUNDLE_INTEGRITY_PUBLIC_KEY_RING: ${{ secrets.WHETSTONE_BUNDLE_INTEGRITY_PUBLIC_KEY_RING }}
      - name: Checkout exact caller Unitbench revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: unitbench
          persist-credentials: false
      - name: Unitbench live delivery-parity evidence
        env:
          WHETSTONE_RELEASE_PARITY_DESCRIPTOR: ${{ runner.temp }}/release-parity/descriptor.json
          UNITBENCH_RELEASE_PARITY_TOKEN: ${{ secrets.UNITBENCH_RELEASE_PARITY_TOKEN }}
          UNITBENCH_BUNDLE_INTEGRITY_PUBLIC_KEYS: ${{ secrets.WHETSTONE_BUNDLE_INTEGRITY_PUBLIC_KEY_RING }}
          ANALYSIS_DATABASE_URL: ${{ secrets.MOTHERDUCK_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: url.https://x-access-token:${{ secrets.GH_DR_ORG_REPOS_READ_TOKEN }}@github.com/danielle-rothermel/.insteadOf
          GIT_CONFIG_VALUE_0: https://github.com/danielle-rothermel/
        run: |
          cd unitbench
          corepack enable
          pnpm install --frozen-lockfile
          pnpm check:delivery-parity
      - name: Always clean run-owned fixture
        if: always()
        run: uv run whetstone-publish release-parity-fixture cleanup --descriptor "$RUNNER_TEMP/release-parity/descriptor.json" --journal "$RUNNER_TEMP/release-parity/descriptor.json.journal.json" --cleanup-proof "$RUNNER_TEMP/release-parity/cleanup-proof.json"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MOTHERDUCK_DATABASE_URL: ${{ secrets.MOTHERDUCK_DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          WHETSTONE_BUNDLE_INTEGRITY_KEY_ID: ${{ secrets.WHETSTONE_BUNDLE_INTEGRITY_KEY_ID }}
          WHETSTONE_BUNDLE_INTEGRITY_PRIVATE_KEY_PATH: ${{ runner.temp }}/whetstone-integrity/private.pem
          WHETSTONE_BUNDLE_INTEGRITY_PUBLIC_KEY_RING: ${{ secrets.WHETSTONE_BUNDLE_INTEGRITY_PUBLIC_KEY_RING }}
      - name: Verify fail-closed cleanup evidence
        if: always()
        run: uv run whetstone-publish release-parity-fixture verify-evidence --descriptor "$RUNNER_TEMP/release-parity/descriptor.json" --journal "$RUNNER_TEMP/release-parity/descriptor.json.journal.json" --cleanup-proof "$RUNNER_TEMP/release-parity/cleanup-proof.json"
      - name: Remove ephemeral bundle integrity key
        if: always()
        run: rm -rf "$RUNNER_TEMP/whetstone-integrity"
      - name: Upload parity evidence
        if: always()
        uses: actions/upload-artifact@0b7f8abb1508181956e8e162db84b466c27e18ce
        with:
          name: release-parity-evidence
          path: ${{ runner.temp }}/release-parity/*.json
          if-no-files-found: error
